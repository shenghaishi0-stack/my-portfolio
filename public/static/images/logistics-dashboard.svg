<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Package icon -->
  <g transform="translate(400, 180)">
    <rect x="-50" y="-40" width="100" height="80" rx="8" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="url(#accent)" stroke-width="3"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="url(#accent)" stroke-width="3"/>
    <path d="M-30,-20 L0,-40 L30,-20" fill="none" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <!-- Data cards -->
  <g transform="translate(120, 320)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#ffffff10"/>
    <text x="70" y="35" text-anchor="middle" fill="#00d4ff" font-size="24" font-weight="bold">1,286</text>
    <text x="70" y="60" text-anchor="middle" fill="#ffffff80" font-size="12">总订单数</text>
  </g>

  <g transform="translate(330, 320)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#ffffff10"/>
    <text x="70" y="35" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="bold">892</text>
    <text x="70" y="60" text-anchor="middle" fill="#ffffff80" font-size="12">运输中</text>
  </g>

  <g transform="translate(540, 320)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#ffffff10"/>
    <text x="70" y="35" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold">23</text>
    <text x="70" y="60" text-anchor="middle" fill="#ffffff80" font-size="12">异常件</text>
  </g>

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="system-ui">智能物流看板</text>
  <text x="400" y="105" text-anchor="middle" fill="#ffffff60" font-size="14" font-family="system-ui">Smart Logistics Dashboard</text>

  <!-- Bar chart -->
  <g transform="translate(120, 420)">
    <rect x="0" y="0" width="20" height="60" rx="3" fill="#00d4ff"/>
    <rect x="35" y="20" width="20" height="40" rx="3" fill="#7c3aed"/>
    <rect x="70" y="10" width="20" height="50" rx="3" fill="#00d4ff"/>
    <rect x="105" y="30" width="20" height="30" rx="3" fill="#7c3aed"/>
    <rect x="140" y="0" width="20" height="60" rx="3" fill="#00d4ff"/>
    <rect x="175" y="25" width="20" height="35" rx="3" fill="#7c3aed"/>
  </g>

  <!-- Trend line -->
  <g transform="translate(540, 420)">
    <polyline points="0,50 30,35 60,40 90,20 120,25 150,10" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="150" cy="10" r="4" fill="#00d4ff"/>
    <text x="75" y="70" text-anchor="middle" fill="#ffffff60" font-size="10">物流趋势</text>
  </g>
</svg>
